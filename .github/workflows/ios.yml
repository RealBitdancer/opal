# Cross-compiles the opal static library for iOS device and simulator. Runs on pushes to
# main (which includes merges) and on demand.

name: iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: device
            sysroot: iphoneos
          - name: simulator
            sysroot: iphonesimulator
    steps:
      - uses: actions/checkout@v5

      - name: Install ninja
        run: brew install ninja

      - name: Configure
        run: cmake --preset ios -DCMAKE_OSX_SYSROOT=${{ matrix.sysroot }}

      - name: Build
        run: |
          for preset in ios-debug ios-release; do
            cmake --build --preset "$preset"
          done
